<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detail Artikel</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
  <style>
    .detail-container {
      max-width: 800px;
      margin: 2rem auto;
      padding: 0 1.5rem;
      background: white;
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      padding: 2rem;
    }
    .detail-container .back-link {
      display: inline-block;
      margin-bottom: 1.5rem;
      color: #0f172a;
      text-decoration: none;
      font-weight: 600;
      transition: 0.2s;
    }
    .detail-container .back-link:hover {
      color: #facc15;
    }
    .detail-container .detail-image {
      width: 100%;
      max-height: 400px;
      object-fit: cover;
      border-radius: 16px;
      margin: 1rem 0 1.5rem;
    }
    .detail-container .detail-meta {
      color: #94a3b8;
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
    }
    .detail-container .detail-body {
      line-height: 1.8;
      color: #1e293b;
      font-size: 1.05rem;
      white-space: pre-wrap;
    }
    .not-found {
      text-align: center;
      padding: 4rem 2rem;
      color: #94a3b8;
    }
    .loading-spinner {
      text-align: center;
      padding: 4rem;
      font-size: 1.2rem;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <header>
    <h1>📘 <span>Portal</span> Kampus & Beasiswa</h1>
    <div class="admin-link">
      <a href="admin.html">🔐 Admin</a>
    </div>
  </header>

  <main>
    <div class="detail-container" id="detailContainer">
      <a href="index.html" class="back-link">← Kembali ke Beranda</a>
      <div id="detailContent">
        <!-- akan diisi JS -->
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 - Portal Edukasi</p>
  </footer>

  <script type="module" src="detail.js"></script>
</body>
</html>
